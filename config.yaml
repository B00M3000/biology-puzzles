secret:
  code: "93PL4"
  message: "Great job!"

settings:
  title: "Enzymes & Neurons"
  subtitle: "Three puzzles. Pick your poison."
  bin_sort_time: 90

bins:
  - id: "true"
    name: "True"
    accent: "#15803d"
    bg: "#dcfce7"
  - id: "false"
    name: "False"
    accent: "#c2410c"
    bg: "#fee2e2"

bin_items:
  - id: s1
    label: "Enzymes lower the activation energy of a reaction."
    bin: "true"
    explain: "Right — that's the whole mechanism."
  - id: s2
    label: "Enzymes are not consumed in the reactions they catalyze."
    bin: "true"
    explain: "Correct — catalysts are reused many times."
  - id: s3
    label: "Most enzymes are proteins folded into a specific 3D shape."
    bin: "true"
    explain: "Yes — shape determines function."
  - id: s4
    label: "The active site is where the substrate binds."
    bin: "true"
    explain: "Correct — induced fit happens here."
  - id: s5
    label: "At rest, the inside of a neuron is more negative than the outside."
    bin: "true"
    explain: "Yes — about −70 mV."
  - id: s6
    label: "Voltage-gated Na⁺ channels open during depolarization."
    bin: "true"
    explain: "Correct — that's what causes the spike."
  - id: s7
    label: "K⁺ flowing out of the cell causes repolarization."
    bin: "true"
    explain: "Yes — K⁺ efflux restores the negative interior."
  - id: s8
    label: "Ca²⁺ entry at the axon terminal triggers neurotransmitter release."
    bin: "true"
    explain: "Correct — Ca²⁺ binds vesicle proteins to fuse them."
  - id: s9
    label: "Enzymes change the overall energy released by a reaction."
    bin: "false"
    explain: "False — enzymes only lower activation energy, not ΔG."
  - id: s10
    label: "Enzymes work equally well at any temperature or pH."
    bin: "false"
    explain: "False — each enzyme has optimal conditions; extremes denature them."
  - id: s11
    label: "An enzyme is used up after catalyzing one reaction."
    bin: "false"
    explain: "False — enzymes are reusable; that's why they're catalysts."
  - id: s12
    label: "Enzymes can catalyze any chemical reaction."
    bin: "false"
    explain: "False — they're highly specific to their substrate."
  - id: s13
    label: "The Na⁺/K⁺ pump moves ions down their concentration gradients."
    bin: "false"
    explain: "False — it actively pumps against gradients using ATP."
  - id: s14
    label: "Action potentials vary in size depending on stimulus strength."
    bin: "false"
    explain: "False — they're all-or-nothing; strength is coded by frequency."
  - id: s15
    label: "Na⁺ flows out of the cell during depolarization."
    bin: "false"
    explain: "False — Na⁺ flows IN, making the inside positive."
  - id: s16
    label: "Neurotransmitters travel down the axon to reach the next neuron."
    bin: "false"
    explain: "False — the action potential travels down the axon; neurotransmitters cross the synapse."
  - id: s17
    label: "Competitive inhibitors mimic the substrate and block the active site."
    bin: "true"
    explain: "Correct — they compete directly with the substrate for the same binding site."
  - id: s18
    label: "Myelin sheath speeds up action potential conduction along an axon."
    bin: "true"
    explain: "Yes — saltatory conduction jumps between nodes of Ranvier, greatly increasing speed."
  - id: s19
    label: "The Na⁺/K⁺ pump moves 3 Na⁺ out and 2 K⁺ in per ATP."
    bin: "true"
    explain: "Correct — the unequal exchange contributes to the negative resting potential."
  - id: s20
    label: "Allosteric inhibitors bind at a site other than the active site."
    bin: "true"
    explain: "Yes — allosteric means 'other site'; binding there changes the enzyme's shape."
  - id: s21
    label: "Neurotransmitters bind to receptors on the postsynaptic membrane."
    bin: "true"
    explain: "Correct — they diffuse across the synaptic cleft and bind postsynaptic receptors."
  - id: s22
    label: "A substrate concentration that saturates all active sites limits reaction rate."
    bin: "true"
    explain: "Yes — that maximum rate is called Vmax; adding more substrate beyond that point does nothing."
  - id: s23
    label: "Competitive inhibition can be overcome by increasing substrate concentration."
    bin: "true"
    explain: "Correct — extra substrate out-competes the inhibitor for the active site."
  - id: s24
    label: "Myelinated neurons conduct signals more slowly than unmyelinated ones."
    bin: "false"
    explain: "False — myelin dramatically speeds conduction through saltatory propagation."
  - id: s25
    label: "Inhibitory neurotransmitters cause the postsynaptic neuron to depolarize."
    bin: "false"
    explain: "False — they hyperpolarize the postsynaptic cell, making it less likely to fire."
  - id: s26
    label: "The refractory period allows a neuron to fire again immediately after an action potential."
    bin: "false"
    explain: "False — the refractory period temporarily prevents re-firing, limiting signal frequency."
  - id: s27
    label: "Allosteric inhibitors compete with the substrate for the active site."
    bin: "false"
    explain: "False — allosteric inhibitors bind a different site and change shape; that's what distinguishes them from competitive inhibitors."
  - id: s28
    label: "Increasing temperature always increases enzyme reaction rate."
    bin: "false"
    explain: "False — above the optimum temperature the enzyme denatures and activity drops sharply."

connections_groups:
  - name: "Enzyme catalysis components"
    terms: ["Active site", "Substrate", "Cofactor", "Product"]
    accent: "#8d7000"
    bg: "#f9df6d"
  - name: "Action potential phases"
    terms: ["Resting", "Depolarization", "Repolarization", "Hyperpolarization"]
    accent: "#4a6a1f"
    bg: "#a0c35a"
  - name: "Ions in neuron signaling"
    terms: ["Sodium", "Potassium", "Calcium", "Chloride"]
    accent: "#2f4a99"
    bg: "#b0c4ef"
  - name: "Synaptic transmission parts"
    terms: ["Vesicle", "Neurotransmitter", "Receptor", "Synaptic cleft"]
    accent: "#7a4f87"
    bg: "#ba81c5"

order_steps:
  - id: 1
    text: "Neuron at rest (~−70 mV); Na⁺/K⁺ pump maintains gradients"
  - id: 2
    text: "Stimulus depolarizes membrane to threshold (~−55 mV)"
  - id: 3
    text: "Voltage-gated Na⁺ channels open; Na⁺ rushes in"
  - id: 4
    text: "Membrane reaches peak depolarization (~+30 mV)"
  - id: 5
    text: "Na⁺ channels inactivate; voltage-gated K⁺ channels open"
  - id: 6
    text: "K⁺ flows out, repolarizing the membrane"
  - id: 7
    text: "Brief hyperpolarization, then return to resting potential"
